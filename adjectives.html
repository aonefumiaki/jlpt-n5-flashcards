<style>

  header { padding: 1.25rem 1.5rem; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); background: var(--surface); }
  .logo { font-family: var(--font-display); font-size: 1.25rem; }
  .logo span { color: var(--accent); }
  .header-badge { font-size: 0.7rem; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--accent); background: rgba(108,52,131,0.10); padding: 4px 10px; border-radius: 99px; }

  .controls { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }

  select:focus { outline: none; border-color: var(--accent); }
  .btn { height: 40px; padding: 0 16px; border: 1px solid var(--border); border-radius: 10px; background: var(--surface); font-family: var(--font-body); font-size: 0.8rem; font-weight: 500; color: var(--ink2); cursor: pointer; transition: background 0.15s; white-space: nowrap; }
  .btn:hover { background: var(--bg); color: var(--ink); }
  .progress-wrap { display: flex; align-items: center; gap: 10px; }
  .progress-bar { flex: 1; height: 3px; background: var(--border); border-radius: 99px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 99px; transition: width 0.4s ease; }
  .progress-label { font-size: 0.75rem; color: var(--ink3); min-width: 48px; text-align: right; }
  .type-badge { display: inline-block; font-size: 0.7rem; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; padding: 3px 10px; border-radius: 99px; margin-bottom: 0.75rem; }
  .type-i { background: rgba(108,52,131,0.12); color: var(--accent); }
  .type-na { background: rgba(45,106,79,0.12); color: var(--success); }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); min-height: 300px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2.5rem 2rem; cursor: pointer; position: relative; transition: box-shadow 0.2s, transform 0.15s; user-select: none; }
  .card:hover { box-shadow: 0 4px 24px rgba(0,0,0,0.06); transform: translateY(-1px); }
  .card.flipped { background: #F5F0FB; border-color: rgba(108,52,131,0.2); }
  .card-cat { position: absolute; top: 14px; right: 16px; font-size: 0.68rem; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; color: var(--ink3); }
  .card-num { position: absolute; top: 14px; left: 16px; font-size: 0.68rem; color: var(--ink3); }
  .card-main { text-align: center; display: flex; flex-direction: column; align-items: center; }
  .card-word { font-family: var(--font-display); font-size: clamp(2rem, 8vw, 3.2rem); color: var(--ink); line-height: 1.1; margin-bottom: 4px; }
  .card-romaji { font-size: 0.78rem; color: var(--ink3); letter-spacing: 0.04em; margin-bottom: 2px; }
  .card-furi { font-size: 1rem; color: var(--ink2); margin-bottom: 4px; }
  .card-conj { font-size: 0.75rem; color: var(--ink3); margin-top: 10px; line-height: 2; }
  .card-answer { font-family: var(--font-display); font-size: clamp(1.5rem, 6vw, 2.4rem); color: var(--accent); text-align: center; line-height: 1.2; }
  .card-hint { position: absolute; bottom: 14px; font-size: 0.72rem; color: var(--ink3); }
  .nav-row { display: flex; align-items: center; justify-content: center; gap: 10px; }
  .nav-btn { width: 40px; height: 40px; border: 1px solid var(--border); border-radius: 10px; background: var(--surface); font-size: 1rem; color: var(--ink2); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.15s; }
  .nav-btn:hover { background: var(--bg); color: var(--ink); }
  .nav-btn:disabled { opacity: 0.3; cursor: default; }
  .counter { font-size: 0.8rem; color: var(--ink3); min-width: 56px; text-align: center; }
  .play-btn { height: 40px; padding: 0 18px; border: 1px solid var(--border); border-radius: 10px; background: var(--surface); font-family: var(--font-body); font-size: 0.8rem; font-weight: 500; color: var(--ink2); cursor: pointer; display: flex; align-items: center; gap: 6px; transition: background 0.15s; }
  .play-btn:hover { background: var(--bg); color: var(--ink); }
  .action-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .action-btn { height: 48px; border-radius: 12px; border: 1.5px solid; background: transparent; font-family: var(--font-body); font-size: 0.85rem; font-weight: 500; cursor: pointer; transition: background 0.15s; }

  .action-btn.gotit:hover { background: rgba(108,52,131,0.06); }
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .stat { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 0.75rem 0.5rem; text-align: center; }
  .stat-num { font-family: var(--font-display); font-size: 1.5rem; line-height: 1; color: var(--ink); margin-bottom: 2px; }
  .stat-num.purple { color: var(--accent); }
  .stat-num.red { color: var(--danger); }
  .stat-label { font-size: 0.68rem; color: var(--ink3); letter-spacing: 0.04em; text-transform: uppercase; }
  footer { text-align: center; padding: 1.5rem; font-size: 0.75rem; color: var(--ink3); border-top: 1px solid var(--border); }
  footer a { color: var(--accent); text-decoration: none; }

<body>
<header>
  <div class="logo">Ohanasi <span>JP</span> School</div>
  <div class="header-badge">JLPT N5 · Adjectives</div>
</header>
<main>
  <div class="controls">
    <select id="catSelect" onchange="changeCat()"></select>
    <button class="btn" id="modeBtn" onclick="toggleMode()">EN → JA</button>
    <button class="btn" onclick="shuffle()">Shuffle</button>
  </div>
  <div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="progFill" style="width:0%"></div></div>
    <div class="progress-label" id="progLabel">0%</div>
  </div>
  <div class="card" id="card" onclick="flip()">
    <span class="card-num" id="cardNum"></span>
    <span class="card-cat" id="cardCat"></span>
    <div class="card-main" id="frontSide">
      <div class="type-badge" id="typeBadge"></div>
      <div class="card-word" id="cardWord"></div>
      <div class="card-romaji" id="cardRomaji"></div>
      <div class="card-furi" id="cardFuri"></div>
      <div class="card-conj" id="cardConj"></div>
    </div>
    <div id="backSide" style="display:none">
      <div class="card-answer" id="cardAnswer"></div>
    </div>
    <div class="card-hint" id="cardHint">Tap to reveal</div>
  </div>
  <div class="nav-row">
    <button class="nav-btn" onclick="prev()" id="prevBtn">&#8592;</button>
    <span class="counter" id="counter"></span>
    <button class="nav-btn" onclick="next()" id="nextBtn">&#8594;</button>
    <button class="play-btn" onclick="speak()">
      <svg style="width:14px;height:14px" viewBox="0 0 14 14" fill="none">
        <circle cx="7" cy="7" r="6.5" stroke="currentColor" stroke-width="1"/>
        <path d="M5.5 4.5l4 2.5-4 2.5V4.5z" fill="currentColor"/>
      </svg>
      Play
    </button>
  </div>
  <div class="action-row">
    <button class="action-btn again" onclick="mark('again')">Again</button>
    <button class="action-btn gotit" onclick="mark('ok')">Got it ✓</button>
  </div>
  <div class="stats">
    <div class="stat"><div class="stat-num" id="sTot">0</div><div class="stat-label">Total</div></div>
    <div class="stat"><div class="stat-num" id="sDone">0</div><div class="stat-label">Studied</div></div>
    <div class="stat"><div class="stat-num purple" id="sOk">0</div><div class="stat-label">Got it</div></div>
    <div class="stat"><div class="stat-num red" id="sAgain">0</div><div class="stat-label">Again</div></div>
  </div>
</main>
<footer>Made with love by <a href="https://ohanasi-jpschool-members.com" target="_blank">Ohanasi JP School</a> · JLPT N5 Adjective Vocabulary</footer>

    ["いや","iya","unpleasant / no","いや","na","いやじゃない","いやだった"],
    ["らく","raku","easy / comfortable","楽","na","楽じゃない","楽だった"],
    ["たいせつ","taisetsu","important / precious","大切","na","大切じゃない","大切だった"],
    ["だいじ","daiji","important","大事","na","大事じゃない","大事だった"],
    ["すなお","sunao","honest / obedient","素直","na","素直じゃない","素直だった"],
    ["ゆたか","yutaka","rich / abundant","豊か","na","豊かじゃない","豊かだった"],
    ["へいわ","heiwa","peaceful","平和","na","平和じゃない","平和だった"],
    ["あんしん","anshin","relief / at ease","安心","na","安心じゃない","安心だった"],
    ["しんぱい","shinpai","worried / anxious","心配","na","心配じゃない","心配だった"],
    ["むだ","muda","wasteful / useless","無駄","na","無駄じゃない","無駄だった"],
    ["けんこう","kenkō","healthy","健康","na","健康じゃない","健康だった"],
    ["たしか","tashika","certain / sure","確か","na","確かじゃない","確かだった"],
    ["まあまあ","māmā","so-so","まあまあ","na","まあまあじゃない","まあまあだった"]
  ]
};

const CATS = ["All Adjectives","All i-Adjectives","All na-Adjectives",...Object.keys(ALL_DATA)];
let deck=[],idx=0,flipped=false,mode="ja",stats={ok:0,again:0,done:new Set()};

function buildDeck(cat){
  if(cat==="All Adjectives"){deck=[];Object.entries(ALL_DATA).forEach(([c,ws])=>ws.forEach(w=>deck.push({cat:c,w})));}
  else if(cat==="All i-Adjectives"){deck=[];Object.entries(ALL_DATA).filter(([k])=>k.startsWith("i-")).forEach(([c,ws])=>ws.forEach(w=>deck.push({cat:c,w})));}
  else if(cat==="All na-Adjectives"){deck=[];Object.entries(ALL_DATA).filter(([k])=>k.startsWith("na-")).forEach(([c,ws])=>ws.forEach(w=>deck.push({cat:c,w})));}
  else{deck=(ALL_DATA[cat]||[]).map(w=>({cat,w}));}
  idx=0;flipped=false;stats={ok:0,again:0,done:new Set()};render();
}

function render(){
  if(!deck.length)return;
  const{cat,w}=deck[idx];
  const[furi,romaji,en,kanji,type,neg,past]=w;
  flipped=false;
  document.getElementById('cardCat').textContent=cat;
  document.getElementById('cardNum').textContent=(idx+1)+" / "+deck.length;
  const badge=document.getElementById('typeBadge');
  badge.textContent=type==="i"?"i-adjective":"na-adjective";
  badge.className="type-badge "+(type==="i"?"type-i":"type-na");
  const displayWord=(kanji&&kanji!==furi)?kanji:furi;
  const showFuri=kanji&&kanji!==furi;
  if(mode==="ja"){
    document.getElementById('cardWord').textContent=displayWord;
    document.getElementById('cardRomaji').textContent=romaji;
    document.getElementById('cardFuri').textContent=showFuri?furi:"";
    document.getElementById('cardConj').textContent="(-) "+neg+"　　(past) "+past;
    document.getElementById('cardAnswer').textContent=en;
    document.getElementById('cardHint').textContent="Tap to reveal English";
  }else{
    document.getElementById('cardWord').textContent=en;
    document.getElementById('cardRomaji').textContent=romaji;
    document.getElementById('cardFuri').textContent=showFuri?furi+" ("+kanji+")":furi;
    document.getElementById('cardConj').textContent="";
    document.getElementById('cardAnswer').textContent=displayWord;
    document.getElementById('cardHint').textContent="Tap to reveal Japanese";
  }
  document.getElementById('frontSide').style.display='flex';
  document.getElementById('backSide').style.display='none';
  document.getElementById('card').classList.remove('flipped');
  const pct=deck.length>0?Math.round((stats.done.size/deck.length)*100):0;
  document.getElementById('progFill').style.width=pct+'%';
  document.getElementById('progLabel').textContent=pct+'%';
  document.getElementById('counter').textContent=(idx+1)+" / "+deck.length;
  document.getElementById('prevBtn').disabled=idx===0;
  document.getElementById('nextBtn').disabled=idx===deck.length-1;
  document.getElementById('sTot').textContent=deck.length;
  document.getElementById('sDone').textContent=stats.done.size;
  document.getElementById('sOk').textContent=stats.ok;
  document.getElementById('sAgain').textContent=stats.again;
}

function flip(){
  flipped=!flipped;
  document.getElementById('frontSide').style.display=flipped?'none':'flex';
  document.getElementById('backSide').style.display=flipped?'block':'none';
  document.getElementById('card').classList.toggle('flipped',flipped);
  document.getElementById('cardHint').textContent=flipped?"":(mode==="ja"?"Tap to reveal English":"Tap to reveal Japanese");
}

function speak(){
  if(!('speechSynthesis' in window))return;
  const{w}=deck[idx];
  const utt=new SpeechSynthesisUtterance(w[0]);
  utt.lang='ja-JP';utt.rate=0.85;
  const voices=speechSynthesis.getVoices();
  const ja=voices.find(v=>v.lang.startsWith('ja'));
  if(ja)utt.voice=ja;
  speechSynthesis.cancel();speechSynthesis.speak(utt);
}

function next(){if(idx<deck.length-1){idx++;render();}}
function prev(){if(idx>0){idx--;render();}}
function mark(t){stats.done.add(idx);if(t==='ok')stats.ok++;else stats.again++;if(idx<deck.length-1){idx++;render();}else render();}
function shuffle(){for(let i=deck.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[deck[i],deck[j]]=[deck[j],deck[i]];}idx=0;stats={ok:0,again:0,done:new Set()};render();}
function toggleMode(){mode=mode==="ja"?"en":"ja";document.getElementById('modeBtn').textContent=mode==="ja"?"EN → JA":"JA → EN";idx=0;stats={ok:0,again:0,done:new Set()};render();}
function changeCat(){buildDeck(document.getElementById('catSelect').value);}

const sel=document.getElementById('catSelect');
CATS.forEach(c=>{const o=document.createElement('option');o.value=c;o.textContent=c;sel.appendChild(o);});
speechSynthesis.onvoiceschanged=()=>{};
buildDeck("All Adjectives");
</script>
</body>
