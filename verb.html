<style>

  .logo { font-family: var(--font-display); font-size: 1.25rem; color: var(--ink); }

  .header-badge { font-size: 0.7rem; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--accent); background: rgba(24,95,165,0.10); padding: 4px 10px; border-radius: 99px; }

  .btn.danger { border-color: rgba(193,68,14,0.3); color: var(--danger); }
  .btn.danger:hover { background: rgba(193,68,14,0.05); }

  .leg { font-size: 11px; padding: 2px 10px; border-radius: 99px; }
  .g1 { background: #FAECE7; color: #993C1D; }
  .g2 { background: #EEEDFE; color: #3C3489; }
  .g3 { background: #E1F5EE; color: #085041; }

  .progress-bar { flex: 1; height: 3px; background: var(--border); border-radius: 99px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 99px; transition: width 0.4s ease; }
  .progress-label { font-size: 0.75rem; color: var(--ink3); min-width: 48px; text-align: right; }
  .mode-banner { display: none; background: #FEF3CD; border: 1px solid #EF9F27; border-radius: 10px; padding: 8px 16px; font-size: 12px; color: #854F0B; text-align: center; }
  .mode-banner.show { display: block; }
  .type-badge { display: inline-block; font-size: 10px; font-weight: 500; letter-spacing: 0.06em; padding: 3px 12px; border-radius: 99px; margin-bottom: 14px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); min-height: 300px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2.5rem 2rem; cursor: pointer; position: relative; transition: box-shadow 0.2s, transform 0.15s; user-select: none; }
  .card:hover { box-shadow: 0 4px 24px rgba(0,0,0,0.06); transform: translateY(-1px); }
  .card.flipped { background: #F0F7F3; border-color: rgba(45,106,79,0.2); }
  .card.review { background: #FFF8F0; border-color: rgba(186,117,23,0.3); }
  .card-cat { position: absolute; top: 14px; right: 16px; font-size: 0.68rem; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; color: var(--ink3); }
  .card-num { position: absolute; top: 14px; left: 16px; font-size: 0.68rem; color: var(--ink3); }
  .card-main { text-align: center; display: flex; flex-direction: column; align-items: center; }
  .card-word { font-family: var(--font-display); font-size: clamp(2rem, 8vw, 3.2rem); color: var(--ink); line-height: 1.1; margin-bottom: 4px; }
  .card-romaji { font-size: 0.78rem; color: var(--ink3); letter-spacing: 0.04em; margin-bottom: 2px; }
  .card-furi { font-size: 1rem; color: var(--ink2); }
  .card-masu { font-size: 0.78rem; color: var(--ink3); margin-top: 10px; }
  .card-answer { font-family: var(--font-display); font-size: clamp(1.4rem, 5vw, 2.2rem); color: var(--success); text-align: center; line-height: 1.3; }
  .card-hint { position: absolute; bottom: 14px; font-size: 0.72rem; color: var(--ink3); }
  .nav-row { display: flex; align-items: center; justify-content: center; gap: 10px; }
  .nav-btn { width: 40px; height: 40px; border: 1px solid var(--border); border-radius: 10px; background: var(--surface); font-size: 1rem; color: var(--ink2); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.15s; }
  .nav-btn:hover { background: var(--bg); color: var(--ink); }
  .nav-btn:disabled { opacity: 0.3; cursor: default; }
  .counter { font-size: 0.8rem; color: var(--ink3); min-width: 56px; text-align: center; }
  .play-btn { height: 40px; padding: 0 18px; border: 1px solid var(--border); border-radius: 10px; background: var(--surface); font-family: var(--font-body); font-size: 0.8rem; font-weight: 500; color: var(--ink2); cursor: pointer; display: flex; align-items: center; gap: 6px; transition: background 0.15s; }

  .action-btn { height: 48px; border-radius: 12px; border: 1.5px solid; background: transparent; font-family: var(--font-body); font-size: 0.85rem; font-weight: 500; cursor: pointer; transition: background 0.15s; }

  .review-btn:disabled { opacity: 0.3; cursor: default; }

  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .stat { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 0.75rem 0.5rem; text-align: center; }
  .stat-num { font-family: var(--font-display); font-size: 1.5rem; line-height: 1; color: var(--ink); margin-bottom: 2px; }

<header>

  <div class="header-badge">JLPT N5 · Verbs</div>

<main>

  <div class="legend">

    <div class="progress-label" id="progLabel">0%</div>
  </div>
  <div class="mode-banner" id="modeBanner">Review Mode — Showing Again cards only</div>
  <div class="card" id="card" onclick="flip()">
    <span class="card-num" id="cardNum"></span>
    <span class="card-cat" id="cardCat"></span>
    <div class="card-main" id="frontSide">
      <div class="type-badge" id="typeBadge"></div>
      <div class="card-word" id="cardWord"></div>
      <div class="card-romaji" id="cardRomaji"></div>
      <div class="card-furi" id="cardFuri"></div>
      <div class="card-masu" id="cardMasu"></div>
    </div>
    <div id="backSide" style="display:none">
      <div class="card-answer" id="cardAnswer"></div>
    </div>
    <div class="card-hint" id="cardHint">Tap to reveal English</div>
  </div>
  <div class="nav-row">
    <button class="nav-btn" onclick="prev()" id="prevBtn">&#8592;</button>
    <span class="counter" id="counter"></span>
    <button class="nav-btn" onclick="next()" id="nextBtn">&#8594;</button>
    <button class="play-btn" onclick="speak()">
      <svg style="width:14px;height:14px" viewBox="0 0 14 14" fill="none">
        <circle cx="7" cy="7" r="6.5" stroke="currentColor" stroke-width="1"/>
        <path d="M5.5 4.5l4 2.5-4 2.5V4.5z" fill="currentColor"/>
      </svg>
      Play
    </button>
  </div>
  <div class="action-row">
    <button class="action-btn again" onclick="mark('again')">Again</button>
    <button class="action-btn gotit" onclick="mark('ok')">Got it ✓</button>
  </div>
  <button class="review-btn" id="reviewBtn" onclick="toggleReview()" disabled>
    <svg style="width:13px;height:13px" viewBox="0 0 13 13" fill="none">
      <path d="M2 6.5a4.5 4.5 0 108-2.8" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
      <path d="M10 1.5v2.2H7.8" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    Review Again Cards (<span id="againCount">0</span>)
  </button>
  <div class="stats">
    <div class="stat"><div class="stat-num" id="sTot">0</div><div class="stat-label">Total</div></div>
    <div class="stat"><div class="stat-num" id="sRem">0</div><div class="stat-label">Remaining</div></div>
    <div class="stat"><div class="stat-num blue" id="sOk">0</div><div class="stat-label">Got it</div></div>
    <div class="stat"><div class="stat-num amber" id="sAg">0</div><div class="stat-label">Again</div></div>
  </div>
</main>
<footer>
  Made with love by <a href="https://ohanasi-jpschool-members.com" target="_blank">Ohanasi JP School</a> &nbsp;·&nbsp; JLPT N5 Verb Vocabulary

function loadStorage() {
  try { const r = localStorage.getItem(STORAGE_KEY); return r ? JSON.parse(r) : {gotit:[],again:[]}; }
  catch(e) { return {gotit:[],again:[]}; }
}
function saveStorage() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify({gotit:[...gotitSet],again:[...againSet]})); }
  catch(e) {}
}

  let words = [];
  if (catName === "全動詞") {
    Object.entries(ALL_DATA).forEach(([cat, ws]) => ws.forEach(w => words.push({cat, w})));
  } else {
    (ALL_DATA[catName] || []).forEach(w => words.push({cat: catName, w}));
  }
  allDeck = words;
  reviewMode = false;
  document.getElementById('modeBanner').classList.remove('show');
  document.getElementById('reviewBtn').classList.remove('active');
  activeDeck = allDeck.filter(item => !gotitSet.has(makeKey(item.w)));
  idx = 0; flipped = false;
  render();
}

function render() {
  updateStats();
  updateReviewBtn();
  if (!activeDeck.length) {
    document.getElementById('cardWord').textContent = reviewMode ? "Review complete!" : "All mastered!";
    document.getElementById('cardRomaji').textContent = "";
    document.getElementById('cardFuri').textContent = "";
    document.getElementById('cardMasu').textContent = "";
    document.getElementById('cardAnswer').textContent = "";
    document.getElementById('cardHint').textContent = "";
    document.getElementById('cardCat').textContent = "";
    document.getElementById('cardNum').textContent = "";
    document.getElementById('typeBadge').textContent = "";
    document.getElementById('counter').textContent = "0 / 0";
    document.getElementById('progFill').style.width = "100%";
    document.getElementById('progLabel').textContent = "100%";
    document.getElementById('prevBtn').disabled = true;
    document.getElementById('nextBtn').disabled = true;
    return;
  }
  const {cat, w} = activeDeck[idx];
  const [kanji, furi, romaji, en, grp, masu] = w;
  flipped = false;
  document.getElementById('cardCat').textContent = reviewMode ? "Review Mode" : cat;
  document.getElementById('cardNum').textContent = (idx + 1) + " / " + activeDeck.length;
  const badge = document.getElementById('typeBadge');
  badge.textContent = typeLabel[grp];
  badge.className = "type-badge " + typeClass[grp];
  const showFuri = kanji !== furi;
  if (mode === "ja") {
    document.getElementById('cardWord').textContent = kanji;
    document.getElementById('cardRomaji').textContent = romaji;
    document.getElementById('cardFuri').textContent = showFuri ? furi : "";
    document.getElementById('cardMasu').textContent = "ます形: " + masu;
    document.getElementById('cardAnswer').textContent = en;
    document.getElementById('cardHint').textContent = "Tap to reveal English";
  } else {
    document.getElementById('cardWord').textContent = en;
    document.getElementById('cardRomaji').textContent = "";
    document.getElementById('cardFuri').textContent = "";
    document.getElementById('cardMasu').textContent = "";
    document.getElementById('cardAnswer').textContent = showFuri ? kanji + "（" + furi + "）" : furi;
    document.getElementById('cardHint').textContent = "Tap to reveal Japanese";
  }
  document.getElementById('frontSide').style.cssText = 'display:flex;flex-direction:column;align-items:center';
  document.getElementById('backSide').style.display = 'none';
  document.getElementById('card').className = 'card' + (reviewMode ? ' review' : '');
  const total = allDeck.length;
  const mastered = allDeck.filter(item => gotitSet.has(makeKey(item.w))).length;
  const pct = total > 0 ? Math.round((mastered / total) * 100) : 0;
  document.getElementById('progFill').style.width = pct + '%';
  document.getElementById('progLabel').textContent = pct + '%';
  document.getElementById('counter').textContent = (idx + 1) + " / " + activeDeck.length;
  document.getElementById('prevBtn').disabled = idx === 0;
  document.getElementById('nextBtn').disabled = idx === activeDeck.length - 1;
}

function updateStats() {
  const total = allDeck.length;
  const mastered = allDeck.filter(item => gotitSet.has(makeKey(item.w))).length;
  const againCount = allDeck.filter(item => againSet.has(makeKey(item.w))).length;
  document.getElementById('sTot').textContent = total;
  document.getElementById('sRem').textContent = total - mastered;
  document.getElementById('sOk').textContent = mastered;
  document.getElementById('sAg').textContent = againCount;
}

function updateReviewBtn() {
  const againCount = allDeck.filter(item => againSet.has(makeKey(item.w))).length;
  document.getElementById('againCount').textContent = againCount;
  document.getElementById('reviewBtn').disabled = againCount === 0;
}

function flip() {
  if (!activeDeck.length) return;
  flipped = !flipped;
  document.getElementById('frontSide').style.cssText = flipped ? 'display:none' : 'display:flex;flex-direction:column;align-items:center';
  document.getElementById('backSide').style.cssText = flipped ? 'display:flex;flex-direction:column;align-items:center' : 'display:none';
  document.getElementById('card').className = (flipped ? 'card flipped' : 'card') + (reviewMode ? ' review' : '');
  document.getElementById('cardHint').textContent = flipped ? "" : (mode === "ja" ? "Tap to reveal English" : "Tap to reveal Japanese");
}

function mark(type) {
  if (!activeDeck.length) return;
  const key = makeKey(activeDeck[idx].w);
  if (type === 'ok') {
    gotitSet.add(key); againSet.delete(key);
    saveStorage();
    activeDeck.splice(idx, 1);
    if (idx >= activeDeck.length) idx = Math.max(0, activeDeck.length - 1);
  } else {
    againSet.add(key); gotitSet.delete(key);
    saveStorage();
    if (idx < activeDeck.length - 1) idx++;
  }
  render();
}

function next() { if (idx < activeDeck.length - 1) { idx++; render(); } }
function prev() { if (idx > 0) { idx--; render(); } }

function toggleReview() {
  if (!reviewMode) {
    const againItems = allDeck.filter(item => againSet.has(makeKey(item.w)));
    if (!againItems.length) return;
    reviewMode = true;
    activeDeck = againItems;
    idx = 0; flipped = false;
    document.getElementById('modeBanner').classList.add('show');
    document.getElementById('reviewBtn').classList.add('active');
  } else {
    reviewMode = false;
    activeDeck = allDeck.filter(item => !gotitSet.has(makeKey(item.w)));
    idx = 0; flipped = false;
    document.getElementById('modeBanner').classList.remove('show');
    document.getElementById('reviewBtn').classList.remove('active');
  }
  render();
}

function shuffle() {
  for (let i = activeDeck.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [activeDeck[i], activeDeck[j]] = [activeDeck[j], activeDeck[i]];
  }
  idx = 0; render();
}

function toggleMode() {
  mode = mode === "ja" ? "en" : "ja";
  document.getElementById('modeBtn').textContent = mode === "ja" ? "EN → JA" : "JA → EN";
  render();
}

function changeCat() { buildDeck(document.getElementById('catSelect').value); }

function resetAll() {
  if (!confirm("Reset all progress?\nGot it and Again records will be cleared.")) return;
  gotitSet.clear(); againSet.clear();
  saveStorage();
  buildDeck(document.getElementById('catSelect').value);
}

function speak() {
  if (!('speechSynthesis' in window) || !activeDeck.length) return;
  const {w} = activeDeck[idx];
  const utt = new SpeechSynthesisUtterance(w[1]);
  utt.lang = 'ja-JP'; utt.rate = 0.85;
  const ja = speechSynthesis.getVoices().find(v => v.lang.startsWith('ja'));
  if (ja) utt.voice = ja;
  speechSynthesis.cancel(); speechSynthesis.speak(utt);
}

const sel = document.getElementById('catSelect');
CATS.forEach(c => { const o = document.createElement('option'); o.value = c; o.textContent = c; sel.appendChild(o); });
speechSynthesis.onvoiceschanged = () => {};
buildDeck("全動詞");
</script>
</body>
</html>
